{% extends 'base.html' %}

{% block title %}Delete Product - InvBill Pro{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">
                <h3 class="mb-4 fw-bold text-danger">Confirm Deletion</h3>
                <p class="mb-4">Are you sure you want to delete product <strong>"{{ product.name }}"</strong>? This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2">Yes, Delete</button>
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
